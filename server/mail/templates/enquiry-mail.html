<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Service Enquiry</title>
</head>
<body style="margin:0; padding:0; background-color:#f5f7fa; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f5f7fa; padding:20px 0;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background-color:#4a90e2; padding:16px 24px; color:#ffffff;">
              <h2 style="margin:0; font-size:20px;">New Service Enquiry</h2>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:24px; color:#333333; font-size:14px;">

              <!-- Info Table -->
              <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                <tr>
                  <td style="padding:8px 0; font-weight:bold; width:120px;">Name:</td>
                  <td style="padding:8px 0;">{{name}}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0; font-weight:bold;">Email:</td>
                  <td style="padding:8px 0;">{{email}}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0; font-weight:bold;">Contact:</td>
                  <td style="padding:8px 0;">{{contact}}</td>
                </tr>
                <tr>
                  <td style="padding:8px 0; font-weight:bold;">Subject:</td>
                  <td style="padding:8px 0;">{{subject}}</td>
                </tr>
              </table>

              <!-- Divider -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="padding:16px 0;">
                    <hr style="border:none; border-top:1px solid #eeeeee;" />
                  </td>
                </tr>
              </table>

              <!-- Description -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-weight:bold; padding-bottom:8px;">Description:</td>
                </tr>
                <tr>
                  <td style="background:#f9fafc; padding:12px; border-radius:6px; line-height:1.6;">
                    {{description}}
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f5f7fa; padding:12px 24px; font-size:12px; color:#888888; text-align:center;">
              This is an automated message from your website enquiry form.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
