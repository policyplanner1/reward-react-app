<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>New Support Ticket</title>
</head>
<body style="margin:0; padding:0; background-color:#f4f6f8; font-family: Arial, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px 0;">
    <tr>
      <td align="center">
        
        <!-- Main Container -->
        <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
          
          <!-- Header -->
          <tr>
            <td style="background:#4CAF50; color:#ffffff; padding:15px 20px; font-size:18px; font-weight:bold;">
              New Support Ticket
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:20px;">
              
              <table width="100%" cellpadding="10" cellspacing="0" style="border-collapse:collapse; font-size:14px;">
                
                <tr style="background:#f9fafb;">
                  <td style="font-weight:bold; width:150px;">Ticket ID</td>
                  <td>{{ticketId}}</td>
                </tr>

                <tr>
                  <td style="font-weight:bold;">Subject</td>
                  <td>{{subject}}</td>
                </tr>

                <tr style="background:#f9fafb;">
                  <td style="font-weight:bold;">Description</td>
                  <td>{{description}}</td>
                </tr>

                <tr>
                  <td style="font-weight:bold;">Category</td>
                  <td>{{category}}</td>
                </tr>

                <tr style="background:#f9fafb;">
                  <td style="font-weight:bold;">User</td>
                  <td>{{user}}</td>
                </tr>

              </table>

              <!-- Footer -->
              <p style="margin-top:25px; font-size:14px; color:#333;">
                Warm regards,<br>
                <strong>Team RewardPlanners</strong>
              </p>

            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
